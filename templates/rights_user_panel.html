{% extends "base.html" %}

{% block content %}
  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
    }
    .modal-content {
      background: #fff;
      margin: 10% auto;
      padding: 16px;
      border-radius: 8px;
      width: 500px;
      max-width: 95%;
    }
  </style>

  <div class="card">
    <h2 style="margin-top: 0;">Панель управления пользователями</h2>
    <div class="muted" style="margin-bottom: 10px;">{{ arm }}</div>

    <div class="actions" style="margin-bottom: 10px;">
      <button type="button" onclick="openCreateModal()">Создать пользователя</button>
      <form method="post" action="{{ url_for('disable_user') }}" id="disableForm">
        <input type="hidden" id="selectedWorkerId" name="workers_id" value="" />
        <button type="submit">Удалить пользователя</button>
      </form>
    </div>

    <table>
      <thead>
        <tr>
          <th></th>
          <th>Пользователь</th>
          <th>Роль пользователя</th>
        </tr>
      </thead>
      <tbody>
        {% for u in users %}
          <tr>
            <td style="width: 40px;">
              <input type="radio" name="user_select" value="{{ u.workers_id }}" onchange="selectWorker(this.value)" />
            </td>
            <td>{{ u.short_name }}</td>
            <td>{{ u.worker_role }}</td>
          </tr>
        {% else %}
          <tr>
            <td colspan="3" class="muted">Нет активных пользователей.</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <div id="createUserModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-top: 0;">Создание нового пользователя</h3>
      <form method="post" action="{{ url_for('create_user') }}">
        <div class="field">
          <label>Полное имя пользователя</label>
          <input type="text" name="full_name" required />
        </div>
        <div class="field">
          <label>Фамилия И.О.</label>
          <input type="text" name="short_name" required />
        </div>
        <div class="field">
          <label>Роль пользователя</label>
          <select name="worker_role" required>
            <option value="" disabled selected>Выберите роль</option>
            {% for role in roles %}
              <option value="{{ role }}">{{ role }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="actions">
          <button type="submit">Сохранить</button>
          <button type="button" onclick="closeCreateModal()">Отмена</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function openCreateModal() {
      document.getElementById("createUserModal").style.display = "block";
    }
    function closeCreateModal() {
      document.getElementById("createUserModal").style.display = "none";
    }
    function selectWorker(id) {
      document.getElementById("selectedWorkerId").value = id;
    }
    window.onclick = function(event) {
      var modal = document.getElementById("createUserModal");
      if (event.target === modal) {
        closeCreateModal();
      }
    }
  </script>
{% endblock %}
