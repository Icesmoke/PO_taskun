{% extends "base.html" %}

{% block content %}
  <div class="box po-profile">
    <h2 class="page-title">Профиль пользователя</h2>
    <div class="profile-row">
      <div class="profile-sidebar">
        <div class="profile-avatar">
          <div class="muted">Фото недоступно в пилоте</div>
          <div class="profile-avatar__placeholder">?</div>
        </div>
      </div>
      <div class="profile-body">
        <div class="field">
          <div class="muted">ФИО</div>
          <div><strong>{{ user.full_name }}</strong></div>
        </div>
        <div class="field">
          <div class="muted">Роль</div>
          <div><strong>{{ user.worker_role }}</strong></div>
        </div>
        <div class="field">
          <div class="muted">АРМ</div>
          <div><strong>{{ arm }}</strong></div>
        </div>
        <div class="actions actions--zero">
          <form method="post" action="{{ url_for('logout') }}">
            <button type="submit" class="button is-light">Выйти из аккаунта</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
